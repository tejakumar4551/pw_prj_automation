name: Playwright Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    
    # Run inside the official Playwright container matching your package.json
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run Playwright tests
        run: npm run test

      - name: 📈 Upload Test Artifacts (HTML Reports & Failure Media)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: reports/
          retention-days: 14

      - name: 📈 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-raw-data
          path: allure-results/
          retention-days: 14
